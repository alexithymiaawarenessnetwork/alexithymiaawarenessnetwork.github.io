# see https://www.mkdocs.org for details
site_name: "AAN: The Alexithymia Awareness Network"
site_url: "https://alexithymiaawarenessnetwork.org"
site_description: "AAN: The Alexithymia Awareness Network"
theme:
  name: material
  custom_dir: theme/
site_dir: "../docs"

# Include CNAME file for GitHub Pages custom domain
extra:
  generator: false

# Copy CNAME file to output directory
plugins:
  - search

# Markdown extensions — enable admonitions for the crisis callout on support.md
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html

# Exclude affiliate config from site build
# (studies.md is kept built — it's now a redirect stub pointing at papers.md
# so any external links to /studies/ keep working — but it's removed from nav.)
exclude_docs: |
  README.md
  affiliate_config.json
  generate_links.py

# These pages are intentionally built for legacy/deferred URLs, but are not
# part of the current primary navigation.
not_in_nav: |
  advisors.md
  crisis-help.md
  studies.md
  media.md

nav:
  - Home: index.md
  - About Us:
    - Mission: mission.md
    - Network: network.md
    - Contact: contact.md
  - Understanding Alexithymia:
    - FAQ: faq.md
    - Diagnosis & Assessment: diagnosis.md
    - Comorbidities: comorbidities.md
    - Treatment:
      - Overview: treatment.md
      - Therapy Approaches: therapy-approaches.md
    - Lexicon: lexicon.md
  - Understanding Emotions:
    - Emotion Frameworks: emotion-frameworks.md
    - Emotion Researchers:
      - Plutchik: plutchik.md
      - Ekman: ekman.md
      - Brené Brown: brene-brown.md
      - Sifneos: sifneos.md
      - Taylor: taylor.md
      - Bagby: bagby.md
      - Parker: parker.md
      - Wilcox: wilcox.md
      - Bermond: bermond.md
      - Vorst: vorst.md
    - Resources:
      - Overview: resources.md
      - Apps: apps.md
      - Assessment Instruments: tools.md
      - Books: books.md
      - Papers: papers.md
      - Podcasts: podcasts.md
    - Research:
      - Labs: labs.md
  - Community & Events:
    - Support: support.md
    - Conferences: conferences.md
  - News: news.md
