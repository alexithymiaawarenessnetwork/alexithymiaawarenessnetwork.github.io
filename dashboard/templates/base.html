<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Reddit Reference Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Internal only</p>
        <h1><a href="{{ url_for('collections') }}">Reddit Reference Dashboard</a></h1>
      </div>
      <nav>
        <a href="{{ url_for('collections') }}">Collections</a>
      </nav>
    </header>

    <main class="page-shell">
      {% if message %}
      <div class="notice">{{ message }}</div>
      {% endif %}

      {% if selected_source_ids %}
      <section class="selection-banner">
        <strong>Viewing collections:</strong>
        <span>{{ selected_source_ids | join(', ') }}</span>
      </section>
      {% endif %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
