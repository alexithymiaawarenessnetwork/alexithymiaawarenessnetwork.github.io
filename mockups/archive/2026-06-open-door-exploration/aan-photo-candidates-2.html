<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAN Photo Candidates 2</title>
<style>
body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f6f1ea;color:#1f2430}
.wrap{width:min(1200px,calc(100% - 32px));margin:0 auto;padding:32px 0 64px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:24px}
figure{margin:0;background:rgba(255,255,255,.82);border:1px solid #d8cec3;border-radius:24px;overflow:hidden;box-shadow:0 10px 30px rgba(31,36,48,.08)}
img{display:block;width:100%;aspect-ratio:4/3;object-fit:cover;background:#e9e0d6}
figcaption{padding:14px 16px 18px;font-size:.95rem;line-height:1.4}.label{display:block;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#4e6a61;font-weight:700;margin-bottom:6px}
</style>
</head>
<body>
<div class="wrap">
<h1>AAN photo candidates 2</h1>
<div class="grid">
<figure><img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Portrait_of_a_young_woman_in_Montreal%2C_Canada_-_25_July_2007.png" alt="Portrait of a young woman outdoors in Montreal"><figcaption><span class="label">A</span>Portrait: warm, direct, contemporary enough.</figcaption></figure>
<figure><img src="https://upload.wikimedia.org/wikipedia/commons/8/88/Man_Woman_Talking_%2845913066%29.jpeg" alt="A man and woman talking together"><figcaption><span class="label">C</span>Relational moment: candid conversation.</figcaption></figure>
<figure><img src="https://upload.wikimedia.org/wikipedia/commons/0/03/Train_window_person_reading_%28Unsplash%29.jpg" alt="A person reading by a train window"><figcaption><span class="label">G</span>Quiet, reflective, self-understanding energy.</figcaption></figure>
<figure><img src="https://upload.wikimedia.org/wikipedia/commons/3/38/Three_people_listening_intently_to_a_speaker_during_meeting.jpg" alt="Three people listening during a meeting"><figcaption><span class="label">H</span>Listening and support, but possibly too institutional.</figcaption></figure>
</div>
</div>
</body>
</html>
