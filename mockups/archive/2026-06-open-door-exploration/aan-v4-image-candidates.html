<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAN v4 Image Candidates</title>
  <style>
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f6f1ea;color:#1f2430}
    .wrap{width:min(1200px,calc(100% - 32px));margin:0 auto;padding:28px 0 60px;display:grid;gap:28px}
    h1,h2{margin:0 0 12px;font-family:Georgia,serif}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
    figure{margin:0;background:#fffdfc;border:1px solid #d8cec3;border-radius:22px;overflow:hidden;box-shadow:0 14px 36px rgba(31,36,48,.08)}
    img{display:block;width:100%;height:220px;object-fit:cover;background:#ece5dc}
    figcaption{padding:14px 16px 18px;font-size:14px;line-height:1.45}
    strong{display:block;margin-bottom:6px;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#4e6a61}
    code{font-size:12px;display:block;word-break:break-word;color:#5e6670}
  </style>
</head>
<body>
  <div class="wrap">
    <section>
      <h1>AAN v4 image candidates</h1>
      <p>Quick visual comparison for warmer people imagery and a floral garden background.</p>
    </section>

    <section>
      <h2>Lead portrait candidates</h2>
      <div class="grid">
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Smiling_woman_in_blanket_%28Unsplash%29.jpg/1280px-Smiling_woman_in_blanket_%28Unsplash%29.jpg" alt="Lead portrait candidate 1">
          <figcaption><strong>Smiling woman in blanket</strong><code>Smiling_woman_in_blanket_(Unsplash).jpg</code></figcaption>
        </figure>
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Brunette_woman_portrait_%28Unsplash%29.jpg/1280px-Brunette_woman_portrait_%28Unsplash%29.jpg" alt="Lead portrait candidate 2">
          <figcaption><strong>Brunette woman portrait</strong><code>Brunette_woman_portrait_(Unsplash).jpg</code></figcaption>
        </figure>
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Smiling_woman_by_a_window_%28Unsplash_NoRsyXmHGpI%29.jpg/1280px-Smiling_woman_by_a_window_%28Unsplash_NoRsyXmHGpI%29.jpg" alt="Lead portrait candidate 3">
          <figcaption><strong>Smiling woman by a window</strong><code>Smiling_woman_by_a_window_(Unsplash_NoRsyXmHGpI).jpg</code></figcaption>
        </figure>
      </div>
    </section>

    <section>
      <h2>Reflective / quiet moment candidates</h2>
      <div class="grid">
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/A_woman_looking_out_the_window_%28Unsplash%29.jpg/1280px-A_woman_looking_out_the_window_%28Unsplash%29.jpg" alt="Reflection candidate 1">
          <figcaption><strong>A woman looking out the window</strong><code>A_woman_looking_out_the_window_(Unsplash).jpg</code></figcaption>
        </figure>
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/db/Quiet_Reflection_%28Unsplash%29.jpg/1280px-Quiet_Reflection_%28Unsplash%29.jpg" alt="Reflection candidate 2">
          <figcaption><strong>Quiet Reflection</strong><code>Quiet_Reflection_(Unsplash).jpg</code></figcaption>
        </figure>
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/Train_window_person_reading_%28Unsplash%29.jpg/1280px-Train_window_person_reading_%28Unsplash%29.jpg" alt="Reflection candidate 3">
          <figcaption><strong>Train window person reading</strong><code>Train_window_person_reading_(Unsplash).jpg</code></figcaption>
        </figure>
      </div>
    </section>

    <section>
      <h2>Conversation / support candidates</h2>
      <div class="grid">
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Friends_talking_over_tea_%28Unsplash%29.jpg/1280px-Friends_talking_over_tea_%28Unsplash%29.jpg" alt="Conversation candidate 1">
          <figcaption><strong>Friends talking over tea</strong><code>Friends_talking_over_tea_(Unsplash).jpg</code></figcaption>
        </figure>
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Young_people_in_conversation_%28Unsplash%29.jpg/1280px-Young_people_in_conversation_%28Unsplash%29.jpg" alt="Conversation candidate 2">
          <figcaption><strong>Young people in conversation</strong><code>Young_people_in_conversation_(Unsplash).jpg</code></figcaption>
        </figure>
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Old_people_conversing_%28Unsplash%29.jpg/1280px-Old_people_conversing_%28Unsplash%29.jpg" alt="Conversation candidate 3">
          <figcaption><strong>Old people conversing</strong><code>Old_people_conversing_(Unsplash).jpg</code></figcaption>
        </figure>
      </div>
    </section>

    <section>
      <h2>Garden / flowers background candidates</h2>
      <div class="grid">
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/In_the_garden_%28Unsplash%29.jpg/1920px-In_the_garden_%28Unsplash%29.jpg" alt="Garden candidate 1">
          <figcaption><strong>In the garden</strong><code>In_the_garden_(Unsplash).jpg</code></figcaption>
        </figure>
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Wild_Garden_%28Unsplash%29.jpg/1920px-Wild_Garden_%28Unsplash%29.jpg" alt="Garden candidate 2">
          <figcaption><strong>Wild Garden</strong><code>Wild_Garden_(Unsplash).jpg</code></figcaption>
        </figure>
        <figure>
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/93/Field_of_Flowers_%28Unsplash%29.jpg/1920px-Field_of_Flowers_%28Unsplash%29.jpg" alt="Garden candidate 3">
          <figcaption><strong>Field of Flowers</strong><code>Field_of_Flowers_(Unsplash).jpg</code></figcaption>
        </figure>
      </div>
    </section>
  </div>
</body>
</html>
